name: CI — N-Body 2D

on:
  push:
    branches: [main, "feat/ci2.0andtestsandmaybeplots"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ensure-base-image:
    name: Verify GHCR base image exists
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - id: resolve
        name: Resolve GHCR image reference
        run: |
          repo_lc=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          img="ghcr.io/${repo_lc}:base"
          echo "image=${img}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image from GHCR
        run: |
          IMAGE="${{ steps.resolve.outputs.image }}"
          echo "Pulling: ${IMAGE}"
          if docker pull "${IMAGE}"; then
            echo "Base image is available."
            exit 0
          fi
          echo "::error::Could not pull base image. Run build-base-container first."
          exit 1

  build-and-test:
    name: Build & Test in container
    needs: ensure-base-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ensure-base-image.outputs.image }}
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Compilar y ejecutar pruebas unitarias (make test)
        working-directory: nbody_2d
        run: make test

      - name: Compilar binario principal (make all)
        working-directory: nbody_2d
        run: make all

      # make analysis:
      #   - Ejecuta ./nbody con los parámetros definidos en main.cpp
      #   - Genera trajectories.dat (posiciones/velocidades por paso)
      #   - Genera energy_timeseries.dat (K, U, E por paso)
      - name: Ejecutar simulación y generar datos (make analysis)
        working-directory: nbody_2d
        run: make analysis

      # make plot:
      #   - Llama a python3 scripts/plot_energy.py → energy_plot.png
      #   - Llama a python3 scripts/plot_trajectories.py → trajectories_plot.png
      #                                                   → position_vs_time.png
      #   Requiere python3 + numpy + matplotlib (instalados en el Dockerfile).
      - name: Generar gráficos de visualización (make plot)
        working-directory: nbody_2d
        run: make plot

      - name: Guardar artefacto de test
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-binaries
          path: nbody_2d/test_runner
          retention-days: 7

      # Subir los archivos de datos como artefactos de CI.
      # Esto permite descargarlos desde la interfaz de GitHub Actions para
      # inspección manual y para verificar que la simulación corrió correctamente.
      - name: Guardar datos de simulación (.dat)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulation-data
          path: |
            nbody_2d/trajectories.dat
            nbody_2d/energy_timeseries.dat
          retention-days: 14

      # Subir los gráficos como artefactos de CI.
      # Permiten verificar visualmente los resultados sin necesidad de correr
      # la simulación localmente.
      - name: Guardar gráficos de visualización (.png)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visualization-plots
          path: |
            nbody_2d/energy_plot.png
            nbody_2d/trajectories_plot.png
            nbody_2d/position_vs_time.png
          retention-days: 14

