# ─────────────────────────────────────────────────────────────
#  GitHub Actions CI Pipeline — N-Body 2D Simulator
#  Rol 5: Calidad, CI y Visualización
#
#  Se activa en: push y pull_request a main/master
#
#  Jobs:
#    1. build-and-test  → instala g++, corre make test + make all
#    2. docker-build    → construye la imagen Docker (depende de job 1)
# ─────────────────────────────────────────────────────────────

name: CI — N-Body 2D

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: compilar y correr tests con Catch2 ─────────────
  build-and-test:
    name: Build & Test (Catch2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar g++ y make
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make

      - name: Compilar y ejecutar tests (make test)
        working-directory: nbody_2d
        run: make test

      - name: Compilar binario principal (make all)
        working-directory: nbody_2d
        run: make all

      - name: Subir test_runner como artefacto (opcional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-binaries
          path: nbody_2d/test_runner
          retention-days: 7

  # ── JOB 2: construir imagen Docker ────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test   # solo corre si job 1 pasó

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        working-directory: nbody_2d
        run: docker build -t nbody_lab1 .
